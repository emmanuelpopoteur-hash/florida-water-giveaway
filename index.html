<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Free Water Test</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #081225;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: #0b1730;
      width: 100%;
      max-width: 520px;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
    }

    h1 {
      font-size: 3rem;
      text-align: center;
      margin-bottom: 16px;
      font-weight: 700;
    }

    p {
      text-align: center;
      color: #d1d5db;
      margin-bottom: 32px;
      line-height: 1.6;
      font-size: 1.2rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    input,
    select {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 14px;
      background: #1b2a47;
      color: white;
      font-size: 1.05rem;
      outline: none;
    }

    input::placeholder {
      color: #9ca3af;
    }

    select {
      cursor: pointer;
    }

    button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 20px;
      border-radius: 14px;
      font-size: 1.3rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      transform: scale(1.02);
      background: #16a34a;
    }

    .footer-text {
      margin-top: 24px;
      text-align: center;
      color: #9ca3af;
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      .container {
        padding: 28px;
      }

      h1 {
        font-size: 2.2rem;
      }

      p {
        font-size: 1rem;
      }

      button {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Free Water Test</h1>

    <p>
      Discover what’s really in your water.
      Get a FREE in-home water analysis today.
    </p>

    <form
      name="lead-form"
      method="POST"
      data-netlify="true"
    >

      <input type="hidden" name="form-name" value="lead-form">

      <input
        type="text"
        name="name"
        placeholder="Full Name"
        required
      >

      <input
        type="tel"
        name="phone"
        placeholder="Phone Number"
        required
      >

      <input
        type="text"
        name="zip"
        placeholder="ZIP Code"
        required
      >

      <select
        name="homeowner"
        required
      >
        <option value="">Are you the homeowner?</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>

      <button type="submit">
        Schedule My Free Test
      </button>

    </form>

    <div class="footer-text">
      Serving Florida homeowners
    </div>

  </div>

</body>

</html>
