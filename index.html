<style>

/* =========================
GLOBAL
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000814;
font-family:Arial,sans-serif;
color:white;
overflow-x:hidden;
}

.container{
max-width:800px;
margin:auto;
border-left:4px solid #ffd700;
border-right:4px solid #ffd700;
background:#000014;
}

/* =========================
TOP BANNERS
========================= */

.top-banner{
background:#ffd700;
color:#000;
font-weight:900;
text-align:center;
padding:25px;
font-size:34px;
line-height:1.2;
border-radius:0 0 40px 40px;
}

.pink-banner{
background:#ff2d7a;
width:85%;
margin:30px auto;
padding:25px;
text-align:center;
font-size:26px;
font-weight:bold;
border-radius:999px;
box-shadow:0 0 30px rgba(255,0,100,.5);
}

/* =========================
HERO
========================= */

.hero{
position:relative;
text-align:center;
}

.hero img{
width:100%;
display:block;
filter:brightness(.55);
}

.hero-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
}

.hero-text h1{
font-size:64px;
line-height:0.95;
font-weight:900;
text-shadow:0 0 15px rgba(0,0,0,.9);
}

.hero-text p{
margin-top:20px;
font-size:18px;
}

/* =========================
FEATURES
========================= */

.feature-list{
padding:40px 20px;
display:flex;
flex-direction:column;
align-items:center;
gap:22px;
}

.feature{
background:#111144;
border:2px solid rgba(255,255,255,.1);
padding:22px;
width:80%;
text-align:center;
border-radius:999px;
font-weight:bold;
font-size:24px;
color:#ffd700;
box-shadow:0 0 20px rgba(255,215,0,.15);
}

/* =========================
FORM
========================= */

.form-section{
margin:40px 20px;
padding:30px;
border:3px solid #ffd700;
border-radius:35px;
background:#02021d;
box-shadow:0 0 30px rgba(255,215,0,.15);
}

.form-title{
text-align:center;
font-size:28px;
font-weight:900;
margin-bottom:25px;
border:3px solid #ffd700;
padding:20px;
border-radius:999px;
color:#ffd700;
background:#111144;
}

form{
display:flex;
flex-direction:column;
gap:18px;
}

input,
select{
padding:22px;
border:none;
border-radius:20px;
font-size:20px;
background:#dbe3f2;
color:#000;
width:100%;
}

select{
background:#111144;
color:#fff;
border:2px solid rgba(255,255,255,.1);
}

button{
background:#ffd700;
color:#000;
border:none;
padding:28px;
font-size:30px;
font-weight:900;
border-radius:25px;
cursor:pointer;
box-shadow:0 0 35px rgba(255,215,0,.5);
transition:.3s;
}

button:hover{
transform:scale(1.03);
}

.small-note{
text-align:center;
font-size:12px;
opacity:.8;
line-height:1.6;
margin-top:10px;
}

/* =========================
DESCRIPTION
========================= */

.description{
padding:10px 30px 50px;
text-align:center;
font-size:17px;
line-height:1.8;
color:#ddd;
}

/* =========================
INCLUDES
========================= */

.includes{
margin:20px;
padding:40px;
border-radius:35px;
border:2px solid #ffd700;
background:#050522;
}

.includes h2{
text-align:center;
font-size:42px;
margin-bottom:30px;
color:#ffd700;
}

.includes ul{
list-style:none;
display:flex;
flex-direction:column;
gap:18px;
font-size:22px;
}

.includes li{
padding-left:10px;
}

/* =========================
TESTIMONIALS
========================= */

.testimonials{
padding:30px 20px 60px;
}

.testimonial{
background:#111144;
padding:25px;
border-radius:25px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,.1);
}

.testimonial strong{
color:#ffd700;
display:block;
margin-bottom:10px;
}

/* =========================
ALERT
========================= */

.alert-box{
margin:30px 20px;
padding:25px;
background:#ff2d2d;
color:#fff;
font-size:24px;
font-weight:900;
text-align:center;
border-radius:25px;
box-shadow:0 0 25px rgba(255,0,0,.5);
}

/* =========================
PHONE
========================= */

.phone-box{
padding:40px;
text-align:center;
}

.phone-box a{
color:#ffd700;
font-size:38px;
font-weight:bold;
text-decoration:none;
}

/* =========================
DESKTOP VERSION
========================= */

@media(min-width: 992px){

.container{
max-width:1400px;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
padding:40px;
align-items:start;
border-left:none;
border-right:none;
}

.top-banner{
grid-column:1/3;
font-size:42px;
padding:45px;
border-radius:35px;
}

.pink-banner{
grid-column:1/3;
font-size:32px;
width:70%;
}

.hero{
border-radius:35px;
overflow:hidden;
box-shadow:0 0 35px rgba(255,255,255,0.08);
}

.hero img{
height:100%;
object-fit:cover;
min-height:700px;
}

.hero-text h1{
font-size:88px;
}

.hero-text p{
font-size:24px;
max-width:700px;
margin:auto;
margin-top:25px;
}

.feature-list{
padding-top:0;
}

.feature{
width:90%;
font-size:24px;
}

.form-section{
margin-top:0;
padding:50px;
position:sticky;
top:20px;
}

.form-title{
font-size:42px;
}

input,
select{
font-size:22px;
padding:24px;
}

button{
font-size:32px;
padding:32px;
}

.description{
grid-column:1/3;
max-width:1100px;
margin:auto;
font-size:22px;
}

.includes{
grid-column:1/3;
max-width:1100px;
}

.includes h2{
font-size:58px;
}

.includes ul{
font-size:28px;
}

.testimonials{
grid-column:1/3;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
}

.testimonial{
margin-bottom:0;
}

.alert-box{
grid-column:1/3;
max-width:1000px;
margin:auto;
font-size:38px;
}

.phone-box{
grid-column:1/3;
}

.phone-box a{
font-size:52px;
}

}

</style>
